name: Custom Workflow

on:
  push:
    branches: [main]

jobs:
  custom-job:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Print message
        run: echo "first custom workflow"

      - name: print current time
        run: date

      - name: success message
        run: echo "Workflow completed successfully!"